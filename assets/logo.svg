<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="420" height="100" rx="6" fill="url(#bg)"/>

  <!-- decorative wave bars (vaporwave grid lines) -->
  <line x1="0" y1="88" x2="420" y2="88" stroke="#7744aa" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="94" x2="420" y2="94" stroke="#7744aa" stroke-width="0.5" opacity="0.3"/>

  <!-- pipe symbol -->
  <rect x="16" y="18" width="7" height="64" rx="3" fill="#ff77cc"/>

  <!-- wordmark -->
  <text x="36" y="62"
        font-family="Courier New, monospace"
        font-size="38"
        font-weight="bold"
        fill="#ff77cc"
        letter-spacing="2">PIPEONJOY</text>

  <!-- tagline -->
  <text x="37" y="80"
        font-family="Courier New, monospace"
        font-size="11"
        fill="#00ffcc"
        letter-spacing="1"
        opacity="0.85">vaporwave composition wizard</text>
</svg>
